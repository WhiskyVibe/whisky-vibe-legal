<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Whisky Vibe Legal</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #111111;
      --card: #1c1c1c;
      --text: #f4f1ea;
      --muted: #c7bfb1;
      --accent: #d6a85f;
      --line: rgba(214, 168, 95, 0.25);
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #faf7f2;
        --card: #ffffff;
        --text: #241b12;
        --muted: #5f5142;
        --line: rgba(122, 87, 35, 0.18);
      }
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap {
      max-width: 840px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }
    h1 { margin: 0 0 10px; font-size: 2rem; }
    p { margin: 0 0 16px; color: var(--muted); }
    ul { padding-left: 18px; }
    a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { text-decoration: underline; }
    .links a {
      display: block;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 12px;
      margin: 12px 0;
      background: transparent;
    }
    .meta {
      margin-top: 18px;
      font-size: 0.95rem;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Whisky Vibe Legal</h1>
      <p>
        This site provides the public legal documents for Whisky Vibe TikTok Uploader.
      </p>
      <div class="links">
        <a href="./terms.html">Terms of Service</a>
        <a href="./privacy.html">Privacy Policy</a>
      </div>
      <p class="meta">
        Contact email on these pages should be updated to the actual operator email before submitting app review.
      </p>
    </section>
  </main>
</body>
</html>
